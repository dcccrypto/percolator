name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Build
        run: cargo build --verbose
      - name: Test (default)
        run: cargo test --verbose
      - name: Test (small)
        run: cargo test --features small --verbose
      - name: Test (medium)
        run: cargo test --features medium --verbose

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Clippy
        run: cargo clippy -- -W clippy::all

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Kani proofs
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          # Exclude harnesses prefixed nightly_* — they run in .github/workflows/nightly.yml.
          # Currently excluded (all renamed to nightly_*):
          #   nightly_funding_zero_sum_across_accounts              (~slow, OOM risk)
          #   nightly_variation_margin_no_pnl_teleport              (~7358s / 122 min — SAT-hard)
          #   nightly_combined_funding_rate_convex                   (~74 min — SAT-hard)
          #   nightly_gap3_conservation_crank_funding_positions      (>2.5h / cadical SAT)
          #   nightly_fee_split_conservative                         (~1765s / 29 min — u128 SAT)
          #   nightly_liquidation_must_reset_warmup_on_mark_increase (~570s / cadical)
          # Note: --harness uses substring matching against the full path (module::fn_name).
          args: --tests --output-format terse --jobs 4 --harness kani_ --harness proof_
        timeout-minutes: 175
